<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>FlowPlan AI</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #0B1F3A, #123A63);
      color: #fff;
      margin: 0;
      padding: 60px 20px;
    }

    .container {
      max-width: 820px;
      margin: auto;
    }

    h1 {
      font-size: 34px;
      margin-bottom: 5px;
    }

    .tagline {
      opacity: 0.8;
      margin-bottom: 10px;
    }

    .subtag {
      opacity: 0.6;
      margin-bottom: 25px;
      font-size: 14px;
    }

    .examples {
      opacity: 0.5;
      font-size: 14px;
      margin-bottom: 15px;
    }

    .quick-actions {
      margin-bottom: 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .quick-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
    }

    .quick-btn:hover {
      background: rgba(255,255,255,0.18);
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 14px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      padding: 14px 22px;
      background: #FF8C42;
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    .summary {
      margin-top: 30px;
      padding: 18px;
      background: rgba(255,255,255,0.08);
      border-radius: 10px;
    }

    .card {
      margin-top: 15px;
      padding: 16px;
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
    }

    .meta {
      opacity: 0.6;
      font-size: 14px;
    }

    .priority {
      margin-top: 8px;
      font-weight: 600;
    }

    .footer {
      margin-top: 40px;
      opacity: 0.4;
      text-align: center;
      font-size: 13px;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>FlowPlan AI</h1>

  <div class="tagline">
    Turn intent into execution — instantly.
  </div>

  <div class="subtag">
    No fluff. Just a plan you can act on.
  </div>

  <div class="examples">
    Try:<br>
    • Plan my day for sales<br>
    • Organize work tasks<br>
    • Build a learning routine
  </div>

  <!-- Quick Buttons -->
  <div class="quick-actions">
    <button class="quick-btn" onclick="quickFill('Plan my day for sales')">Sales</button>
    <button class="quick-btn" onclick="quickFill('Organize my work tasks')">Work</button>
    <button class="quick-btn" onclick="quickFill('Build a learning routine')">Learning</button>
  </div>

  <div class="input-row">
    <input id="query" placeholder="What do you want to accomplish today?" />
    <button onclick="generate()">Create Plan</button>
  </div>

  <div id="summary"></div>
  <div id="results"></div>

  <!-- Save -->
  <div style="margin-top:20px;">
    <button onclick="savePlan()" class="quick-btn">💾 Save Plan</button>
  </div>

  <!-- Feedback -->
  <div style="margin-top:20px; opacity:0.6;">
    Was this helpful?
    <button onclick="feedback(true)" class="quick-btn">👍</button>
    <button onclick="feedback(false)" class="quick-btn">👎</button>
  </div>

  <!-- History -->
  <div id="history" style="margin-top:30px;"></div>

  <div class="footer">
    Multi-agent system for planning & execution
  </div>

</div>

<script>
function quickFill(text) {
  document.getElementById("query").value = text;
  generate();
}

async function generate() {
  const input = document.getElementById("query");
  const button = document.querySelector(".input-row button");
  const query = input.value.trim();

  if (!query) return alert("Enter something");

  const results = document.getElementById("results");
  const summary = document.getElementById("summary");

  button.disabled = true;
  button.innerText = "Working...";

  results.innerHTML = "⚡ Building your plan...";
  summary.innerHTML = "";

  try {
    const res = await fetch("https://mayur-multi-agent-ai.onrender.com/run", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ query })
    });

    const data = await res.json();
    results.innerHTML = "";

    if (data.mode === "error") {
      summary.innerHTML = `<div class="summary">⚠️ ${data.summary}</div>`;
      return;
    }

    summary.innerHTML = `
      <div class="summary">
        <div style="font-size:12px;opacity:0.6">${data.mode.toUpperCase()} MODE</div>
        ${data.summary}
      </div>
    `;

    data.plan.forEach(item => {
      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <b>${item.task}</b>
        <div class="meta">${item.time} • ${item.type}</div>
        <div class="priority">Priority: ${item.priority}</div>
      `;

      results.appendChild(div);
    });

  } catch {
    results.innerHTML = "⚠️ Error connecting";
  } finally {
    button.disabled = false;
    button.innerText = "Create Plan";
  }
}

// Save Plan
function savePlan() {
  const history = JSON.parse(localStorage.getItem("plans") || "[]");

  history.unshift({
    summary: document.getElementById("summary").innerHTML,
    time: new Date().toLocaleString()
  });

  localStorage.setItem("plans", JSON.stringify(history));
  loadHistory();
}

// Load history
function loadHistory() {
  const container = document.getElementById("history");
  const history = JSON.parse(localStorage.getItem("plans") || "[]");

  container.innerHTML = "<h3 style='opacity:0.6;'>Saved Plans</h3>";

  history.slice(0,3).forEach(item => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `<div style="font-size:12px">${item.time}</div>${item.summary}`;
    container.appendChild(div);
  });
}

// Feedback
function feedback(val) {
  console.log("Feedback:", val);
  alert("Thanks for your feedback!");
}

// Enter key
document.getElementById("query").addEventListener("keypress", e => {
  if (e.key === "Enter") generate();
});

loadHistory();
</script>

</body>
</html>
