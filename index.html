<script>
async function generate() {
  const queryInput = document.getElementById("query");
  const button = document.querySelector("button");
  const query = queryInput.value.trim();

  if (!query) {
    alert("Just type what you want to get done.");
    return;
  }

  const resultsDiv = document.getElementById("results");
  const summaryDiv = document.getElementById("summary");

  // Disable button while loading
  button.disabled = true;
  button.innerText = "Working...";

  resultsDiv.innerHTML = "Thinking through your plan...";
  summaryDiv.innerHTML = "";

  try {
    const res = await fetch("https://mayur-multi-agent-ai.onrender.com/run", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ query })
    });

    if (!res.ok) {
      throw new Error("API response failed");
    }

    const data = await res.json();

    resultsDiv.innerHTML = "";

    // Error mode
    if (data.mode === "error") {
      summaryDiv.innerHTML = `
        <div class="summary">
          ⚠️ ${data.summary}
        </div>
      `;
      return;
    }

    // Summary + Mode
    summaryDiv.innerHTML = `
      <div class="summary">
        <b>Mode:</b> ${data.mode}<br><br>
        ${data.summary}
      </div>
    `;

    if (!data.plan || data.plan.length === 0) {
      resultsDiv.innerHTML = "No tasks generated. Try rephrasing.";
      return;
    }

    data.plan.forEach(item => {
      const priorityText =
        item.priority === 3 ? "High priority — act early" :
        item.priority === 2 ? "Medium priority — schedule focus" :
        "Lower priority — flexible timing";

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <div><b>${item.task}</b></div>
        <div class="meta">${item.time} • ${item.type}</div>
        <div class="priority">${priorityText}</div>
      `;

      resultsDiv.appendChild(div);
    });

  } catch (err) {
    resultsDiv.innerHTML = "⚠️ Unable to connect. Try again in a moment.";
  } finally {
    // Re-enable button
    button.disabled = false;
    button.innerText = "Create Plan";
  }
}

// 🔥 Enter key support
document.getElementById("query").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    generate();
  }
});
</script>
